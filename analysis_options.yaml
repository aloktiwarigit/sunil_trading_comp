# =============================================================================
# Yugma Dukaan — shared analyzer config
# Applies to lib_core, customer_app, shopkeeper_app
# =============================================================================

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "build/**"
    - ".dart_tool/**"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Promote critical hygiene to errors so CI fails loudly
    invalid_annotation_target: ignore
    missing_required_param: error
    missing_return: error
    todo: ignore
    # Force await on Futures — silent fire-and-forget is a frequent bug source
    unawaited_futures: error
    # Forbidden vocabulary on udhaar — enforced via custom_lint, see ADR-010
    avoid_print: error

linter:
  rules:
    # Style
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_single_quotes
    - sort_pub_dependencies
    - sort_constructors_first
    - require_trailing_commas

    # Correctness
    - always_declare_return_types
    - always_use_package_imports
    - avoid_dynamic_calls
    - avoid_empty_else
    - avoid_relative_lib_imports
    - avoid_returning_null_for_future
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - control_flow_in_finally
    - hash_and_equals
    - throw_in_finally
    - unnecessary_statements
    - use_build_context_synchronously

    # Documentation
    - public_member_api_docs

    # Async hygiene
    - discarded_futures
