name: shopkeeper_app
description: Yugma Dukaan shopkeeper ops app — Sunil Trading Company.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Shared core — imports barrel for adapters + infra, but NOT project_patch
  # customer variants (enforced by tools/audit_project_patch_imports.sh).
  lib_core:
    path: ../../packages/lib_core

  # ---- State + routing ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.3.0

  # ---- Firebase ----
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.5.1

  # ---- Local storage ----
  shared_preferences: ^2.3.4

  # ---- Models ----
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ---- Camera capture (S4.5 Golden Hour photos + D-10 face upload) ----
  image_picker: ^1.1.2

  # ---- D-10: Color picker for shop branding ----
  flutter_colorpicker: ^1.0.3

  # ---- Audio recording (B1.6 + B1.7 voice notes) ----
  record: ^5.1.2
  path_provider: ^2.1.5

  # ---- Localization ----
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
