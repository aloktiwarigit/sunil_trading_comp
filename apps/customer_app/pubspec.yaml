name: customer_app
description: Yugma Dukaan customer app — Sunil Trading Company.
version: 0.2.0+2
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Shared core — imports barrel for adapters + infra, but NOT project_patch
  # operator variants (enforced by tools/audit_project_patch_imports.sh).
  lib_core:
    path: ../../packages/lib_core

  # ---- State + routing ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.3.0

  # ---- Models ----
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ---- Firebase (transitive via lib_core, but needed for direct use) ----
  cloud_firestore: ^5.4.4
  firebase_remote_config: ^5.1.3

  # ---- UPI intent (C3.5 — free, no payment gateway) ----
  url_launcher: ^6.3.1

  # ---- Audio playback (B1.3, B1.7, B1.10, P2.6 — voice notes) ----
  just_audio: ^0.9.40
  firebase_storage: ^12.3.4

  # ---- Invoice sharing (B1.13) ----
  share_plus: ^10.0.0
  path_provider: ^2.1.5

  # ---- Deep linking (WS1: tenant resolver) ----
  app_links: ^6.3.4

  # ---- Persistence ----
  shared_preferences: ^2.3.3

  # ---- Localization ----
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13
  # Phase 3: in-process Firestore for repo-path tests of payment_controller.
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true

dependency_overrides:
  # analyzer_plugin 0.12.x is incompatible with analyzer 7.6.0
  # (used by CI runner Flutter 3.41.8). Force 0.13.x which supports
  # the Element2 API introduced in analyzer 7.x.
  analyzer_plugin: ^0.13.0
