name: Cloud Functions CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/ci-cloud-functions.yml'
  push:
    branches: [main]
    paths:
      - 'functions/**'

jobs:
  build-and-test:
    name: Lint + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ hashFiles('functions/package.json') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Lint
        working-directory: functions
        run: npm run lint

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Unit tests
        working-directory: functions
        run: npm test --if-present
