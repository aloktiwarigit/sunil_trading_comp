name: Marketing site CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/marketing_site/**'
      - '.github/workflows/ci-marketing.yml'
  push:
    branches: [main]
    paths:
      - 'apps/marketing_site/**'

  workflow_dispatch:
    inputs:
      shop_id:
        description: 'Shop ID to rebuild (e.g. sunil-trading-company)'
        required: true
        default: 'sunil-trading-company'
        type: string

  schedule:
    - cron: '30 20 * * *'

concurrency:
  group: marketing-deploy-${{ github.event_name }}-${{ github.event.inputs.shop_id || 'default' }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ hashFiles('apps/marketing_site/package.json') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/marketing_site/package-lock.json

      - name: Install dependencies
        working-directory: apps/marketing_site
        run: npm ci

      - name: Lint
        working-directory: apps/marketing_site
        run: npm run lint --if-present

      - name: Resolve shop ID
        id: shop
        env:
          RAW_SHOP_ID: ${{ github.event.inputs.shop_id }}
        run: |
          SHOP_ID="${RAW_SHOP_ID}"
          if [ -z "$SHOP_ID" ]; then
            SHOP_ID="sunil-trading-company"
          fi
          if ! echo "$SHOP_ID" | grep -qE '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'; then
            echo "::error::Invalid shop_id '${SHOP_ID}'. Must be lowercase alphanumeric + hyphens, 1-63 chars."
            exit 1
          fi
          echo "shop_id=$SHOP_ID" >> "$GITHUB_OUTPUT"

      - name: Astro build
        working-directory: apps/marketing_site
        env:
          SHOP_ID: ${{ steps.shop.outputs.shop_id }}
          FIREBASE_MARKETING_READONLY_SA_JSON: ${{ secrets.FIREBASE_MARKETING_READONLY_SA_JSON }}
          FIREBASE_STORAGE_BUCKET: yugma-dukaan-dev.firebasestorage.app
        run: npm run build

      - name: Check bundle size
        working-directory: apps/marketing_site
        run: |
          if [ -d dist ]; then
            SIZE=$(du -sb dist/index.html 2>/dev/null | awk '{print $1}' || echo 0)
            echo "index.html size: $SIZE bytes"
            if [ "$SIZE" -gt 102400 ]; then
              echo "::warning::index.html exceeds 100 KB target"
            fi
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-dist
          path: apps/marketing_site/dist/

      - name: Deploy to Firebase Hosting
        if: ${{ github.event_name != 'pull_request' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          # For shop #2, add marketing-{slug} to firebase.json + .firebaserc
          target: marketing-${{ steps.shop.outputs.shop_id }}
          projectId: yugma-dukaan-dev

  notify-on-failure:
    name: Notify on build failure
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: ${{ failure() }}
    steps:
      - name: Log failure for ops
        run: |
          echo "::error::Marketing site build/deploy FAILED for shop: ${{ github.event.inputs.shop_id || 'sunil-trading-company' }}"
          echo "Previous version remains deployed."
          echo "To manually rebuild: gh workflow run ci-marketing.yml -f shop_id=sunil-trading-company"
