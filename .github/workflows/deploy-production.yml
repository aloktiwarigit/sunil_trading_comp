# =============================================================================
# deploy-production.yml — deploy everything to yugma-dukaan production.
#
# Trigger: manual `workflow_dispatch` ONLY (requires DEPLOY confirmation).
# Deploys:
#   - Firestore rules + indexes
#   - Cloud Functions (TS)
#   - Astro marketing site to Firebase Hosting target "marketing"
#
# Mobile app deploys (customer_app + shopkeeper_app) happen via Codemagic
# (free Flutter tier) per SAD §1 — NOT from this workflow.
# =============================================================================

name: Deploy — production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to yugma-dukaan production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'DEPLOY' }}
        run: |
          echo "::error::Confirmation input must be 'DEPLOY' to proceed"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Authenticate to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_PRODUCTION_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Install function deps
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: functions
        run: npm ci

      - name: Build functions
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: functions
        run: npm run build

      - name: Deploy Firestore rules + indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --project production

      - name: Deploy Storage rules
        run: firebase deploy --only storage --project production

      - name: Deploy Cloud Functions
        if: ${{ hashFiles('functions/package.json') != '' }}
        run: firebase deploy --only functions --project production

      - name: Build marketing site
        if: ${{ hashFiles('apps/marketing_site/package.json') != '' }}
        working-directory: apps/marketing_site
        run: |
          npm ci
          npm run build

      - name: Deploy marketing hosting target
        if: ${{ hashFiles('apps/marketing_site/package.json') != '' }}
        run: firebase deploy --only hosting:marketing --project production

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa-key.json
