# =============================================================================
# ci-cross-tenant-test.yml — THE non-negotiable CI gate per ADR-012 + R9.
#
# Runs on every PR to main, regardless of path filter. Runs three gates:
#
#   1. TS rules test (`tools/src/cross_tenant_integrity.test.ts`)
#      against the Firebase emulator with the real firestore.rules loaded.
#      This is the actual security rule enforcement test.
#
#   2. Dart shape test (`packages/lib_core/test/cross_tenant_integrity_test.dart`)
#      using fake_cloud_firestore. Verifies model + repository shape
#      invariants that can't be expressed in rules (every model has shopId,
#      partition patches emit only owned fields, etc.).
#
#   3. project_patch import audit (`tools/audit_project_patch_imports.sh`).
#      Verifies customer_app and shopkeeper_app respect the partition
#      discipline per PRD I6.12 AC #3 + Standing Rule 11.
#
# If ANY of the three fails, the PR is blocked.
# =============================================================================

name: Cross-tenant integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 -- TS rules test against Firebase emulator
  # ---------------------------------------------------------------------------

  ts-rules-test:
    name: TS rules test (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/package-lock.json

      - name: Setup Java (required for Firebase emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install tools dependencies
        working-directory: tools
        run: npm ci

      - name: Build TS
        working-directory: tools
        run: npm run build

      - name: Start Firebase emulators (firestore + storage)
        run: |
          firebase emulators:start \
            --only firestore,storage \
            --project yugma-dukaan-rules-test &
          # Wait for BOTH emulators to become ready (up to 180s).
          # First run downloads each emulator JAR (~30s each), so we need
          # more time than a single-emulator boot. cross_tenant_storage.test.ts
          # (Phase 1) needs Storage at 9199 in addition to Firestore at 8080.
          # The @firebase/rules-unit-testing library handles auth simulation
          # internally — no separate auth emulator required.
          firestore_ready=0
          storage_ready=0
          for i in $(seq 1 180); do
            if [ "$firestore_ready" -ne 1 ] && curl -sf http://127.0.0.1:8080 > /dev/null 2>&1; then
              echo "Firestore emulator ready (after ${i}s)"
              firestore_ready=1
            fi
            if [ "$storage_ready" -ne 1 ] && curl -sf http://127.0.0.1:9199 > /dev/null 2>&1; then
              echo "Storage emulator ready (after ${i}s)"
              storage_ready=1
            fi
            if [ "$firestore_ready" -eq 1 ] && [ "$storage_ready" -eq 1 ]; then
              break
            fi
            echo "Waiting for emulators... firestore=$firestore_ready storage=$storage_ready ($i)"
            sleep 1
          done
          if [ "$firestore_ready" -ne 1 ] || [ "$storage_ready" -ne 1 ]; then
            echo "::error::Emulators failed to start within 180s (firestore=$firestore_ready storage=$storage_ready)"
            exit 1
          fi
          echo "Both Firestore and Storage emulators are up"

      - name: Run TS rules test
        working-directory: tools
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          GCLOUD_PROJECT: yugma-dukaan-rules-test
        run: npm run test:rules

  # ---------------------------------------------------------------------------
  # Job 2 -- Dart shape test
  # ---------------------------------------------------------------------------

  dart-shape-test:
    name: Dart shape test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run build_runner (Freezed + json_serializable codegen)
        run: melos run build_runner

      - name: Run Dart cross-tenant shape test
        run: melos run test:cross-tenant

  # ---------------------------------------------------------------------------
  # Job 3 -- project_patch import audit
  # ---------------------------------------------------------------------------

  import-audit:
    name: project_patch import audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run import audit
        run: bash tools/audit_project_patch_imports.sh

      - name: Phase 3 doc-drift audit
        run: bash tools/audit_phase3_doc_drift.sh
