name: lib_core
description: Yugma Dukaan shared core — models, adapters, repositories, theme, locale.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ---- Firebase ----
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_remote_config: ^5.1.3
  firebase_app_check: ^0.3.1+5
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_performance: ^0.10.0+8
  cloud_functions: ^5.1.3

  # ---- Auth helpers ----
  google_sign_in: ^6.2.1

  # ---- State + DI ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---- Models / codegen ----
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ---- Routing ----
  go_router: ^14.3.0

  # ---- Localization ----
  intl: ^0.20.2

  # ---- Networking ----
  http: ^1.2.2

  # ---- PDF generation (B1.13 Devanagari receipt — client-side per ADR-015) ----
  pdf: ^3.11.1

  # ---- Connectivity (D-8 offline banner) ----
  connectivity_plus: ^6.0.0

  # ---- Shimmer (loading skeletons) ----
  shimmer: ^3.0.0

  # ---- Logging ----
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ---- Codegen ----
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # ---- Test mocks ----
  mocktail: ^1.0.4
  firebase_auth_mocks: ^0.14.1
  fake_cloud_firestore: ^3.0.3
  google_sign_in_mocks: ^0.3.0

flutter:
  uses-material-design: true
